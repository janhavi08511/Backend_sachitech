# Test Configuration for SachITech Backend

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable banner for cleaner test output
spring.main.banner-mode=off

# Logging
logging.level.org.springframework=WARN
logging.level.com.example.sachitech=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration for Tests
jwt.secret=testSecretKeyForJunitTestingPurposesOnly123456789
jwt.expiration=3600000

# File Upload (for LMS tests)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Disable security for some tests (can be overridden)
# spring.security.enabled=false
